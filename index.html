<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="card-container">
        <div class="card">
            <div class="photo-placeholder">
                <!-- Placeholder untuk foto, ganti 'src' dengan URL foto temanmu -->
                <img src="https://via.placeholder.com/150" alt="Friend's Photo" id="friend-photo">
            </div>
            <div class="text-content">
                <h1>Happy Birthday, <br><span id="friend-name" style="color: #ff6b6b;">[Nama Teman]</span>!</h1>
                <p class="message">Semoga harimu dipenuhi dengan kebahagiaan dan tahun ini membawa banyak keceriaan. Semoga semua mimpimu menjadi kenyataan!</p>
                <div class="decorations">
                    <span class="balloon">🎈</span>
                    <span class="cake">🎂</span>
                    <span class="present">🎁</span>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
