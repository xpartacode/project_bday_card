<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selamat Ulang Tahun!</title>
    <link rel="stylesheet" href="style.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&family=Playfair+Display:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
</head>
<body>

    <section class="hero">
        <!-- Foto Background (ganti url foto ke css) -->
        <div class="hero-bg"></div>

        <div class="content-wrapper">
            
            <div class="circular-group">
                <svg viewBox="0 0 500 500" class="curved-text-svg">
                    <path id="text-curve" d="M 50,270 A 200,200 0 0,1 450,270" fill="transparent" />
                    <text>
                        <textPath href="#text-curve" startOffset="50%" text-anchor="middle">
                            SELAMAT ULANG TAHUN
                        </textPath>
                    </text>
                </svg>

                <!-- Foto tengah -->
                <img src="https://via.placeholder.com/250" alt="Foto Teman" class="profile-photo">
            </div>

            <!-- Nama -->
            <h1 class="name-text">NAMA</h1>
        </div>

        <div class="scroll-indicator">
            <p>Scroll ke bawah</p>
            <svg class="arrow-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
        </div>

        <div class="wave-divider">
            <svg data-name="Layer 1" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none">
                <path d="M321.39,56.44c58-10.79,114.16-30.13,172-41.86,82.39-16.72,168.19-17.73,250.45-.39C823.78,31,906.67,72,985.66,92.83c70.05,18.48,146.53,26.09,214.34,3V0H0V27.35A600.21,600.21,0,0,0,321.39,56.44Z" class="shape-fill"></path>
            </svg>
        </div>
    </section>

    <section class="next-section">
        <div class="message-container">
            <div class="gift-box" id="giftBox">
                <svg xmlns="http://www.w3.org/2000/svg" width="180" height="180" viewBox="0 0 24 24" fill="none" stroke="var(--primary-color)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 12 20 22 4 22 4 12"/><rect width="20" height="5" x="2" y="7"/><line x1="12" x2="12" y1="22" y2="7"/><path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/><path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/></svg>
                <p class="gift-hint">Untukmu</p>
            </div>
        </div>
    </section>

    <!-- Kartu Ucapan -->
    <div id="cardModal" class="modal-overlay hidden">
        <div class="card-paper">
            <div class="card-content">
                <h3 class="card-title">Untuk [Nama]</h3>
                <p class="card-text">
                    Selamat ulang tahun! 🎉<br><br>
                    Placeholder Text.<br><br>
                    Salam hangat,<br>
                    <strong>[Namamu]</strong>
                </p>
            </div>
        </div>
        <p class="close-hint">Ketuk di luar kartu untuk menutup</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
